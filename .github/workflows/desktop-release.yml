name: desktop-release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            artifact_name: fsu-desktop-linux
            binary_glob: target/release/fsu-desktop
          - platform: windows
            os: windows-latest
            artifact_name: fsu-desktop-windows
            binary_glob: target/release/fsu-desktop.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/fsu-desktop/src-tauri

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@2

      - name: Build FSU Desktop
        working-directory: apps/fsu-desktop/src-tauri
        run: tauri build

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_glob }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/fsu-desktop-linux/fsu-desktop
            artifacts/fsu-desktop-windows/fsu-desktop.exe